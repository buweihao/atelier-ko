<!DOCTYPE html><html lang="en"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>buweihao</title><meta name="description" content="Choose your preferred language for buweihao."><meta name="author" content="buweihao"><meta name="theme-color" content="#f8f7f4"><link rel="canonical" href="https://atelier-ko.weihaobu.cn/"><link rel="alternate" hreflang="en" href="https://atelier-ko.weihaobu.cn/en"><link rel="alternate" hreflang="zh-CN" href="https://atelier-ko.weihaobu.cn/zh"><link rel="alternate" hreflang="x-default" href="https://atelier-ko.weihaobu.cn/en"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><meta name="robots" content="noindex,nofollow"><meta property="og:title" content="buweihao"><meta property="og:description" content="Choose your preferred language for buweihao."><meta property="og:site_name" content="buweihao"><meta property="og:type" content="website"><meta property="og:url" content="https://atelier-ko.weihaobu.cn/"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="buweihao"><meta name="twitter:description" content="Choose your preferred language for buweihao."><script>
      (() => {
        const storageKey = "atelier-ko-cart";

        function readCart() {
          try {
            return JSON.parse(window.localStorage.getItem(storageKey) || "[]");
          } catch {
            return [];
          }
        }

        function writeCart(items) {
          window.localStorage.setItem(storageKey, JSON.stringify(items));
          document.dispatchEvent(new CustomEvent("atelier-cart-change", { detail: items }));
        }

        function count(items = readCart()) {
          return items.reduce((total, item) => total + Number(item.quantity || 0), 0);
        }

        function updateBadges() {
          const total = count();
          document.querySelectorAll("[data-cart-count]").forEach((node) => {
            node.textContent = `(${total})`;
          });
          const labelTemplate = document.body.dataset.cartLabel || "Cart, {count} items";
          document.querySelectorAll("[data-cart-label]").forEach((node) => {
            node.setAttribute("aria-label", labelTemplate.replace("{count}", String(total)));
          });
        }

        window.AtelierCart = {
          read: readCart,
          write: writeCart,
          count,
          add(slug, quantity = 1) {
            const items = readCart();
            const existing = items.find((item) => item.slug === slug);
            if (existing) {
              existing.quantity += quantity;
              writeCart(items);
              return;
            }
            writeCart([...items, { slug, quantity }]);
          },
          remove(slug) {
            writeCart(readCart().filter((item) => item.slug !== slug));
          },
          setQuantity(slug, quantity) {
            if (quantity <= 0) {
              this.remove(slug);
              return;
            }
            writeCart(readCart().map((item) => (item.slug === slug ? { ...item, quantity } : item)));
          },
          updateBadges,
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", updateBadges);
        } else {
          updateBadges();
        }
        window.addEventListener("storage", updateBadges);
        document.addEventListener("atelier-cart-change", updateBadges);
      })();
    </script><link rel="stylesheet" href="/_astro/BaseLayout.CQKeTt2e.css"></head> <body class="bg-base text-ink" data-cart-label="Cart, {count} items"> <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded-full focus:bg-ink focus:px-4 focus:py-2 focus:text-sm focus:text-[var(--color-base)]"> Skip to main content </a>  <div>  <main id="main-content" class="grid min-h-dvh place-items-center px-6 text-center"> <div class="space-y-6"> <p class="font-serif text-4xl italic">buweihao</p> <p class="text-sm text-faded">Choosing your language...</p> <div class="flex justify-center gap-3"> <a href="/en" class="rounded-full border border-line px-5 py-2 text-sm transition-colors hover:text-accent" data-lang-choice="en">English</a> <a href="/zh" class="rounded-full border border-line px-5 py-2 text-sm transition-colors hover:text-accent" data-lang-choice="zh">中文</a> </div> </div> <script>
      (() => {
        const storageKey = "atelier-ko-locale";
        const supported = ["en", "zh"];

        function savedLocale() {
          try {
            const value = window.localStorage.getItem(storageKey);
            if (supported.includes(value)) return value;
          } catch {}
          const match = document.cookie.match(/(?:^|; )atelier-ko-locale=(en|zh)(?:;|$)/);
          return match?.[1];
        }

        function browserLocale() {
          const languages = navigator.languages?.length ? navigator.languages : [navigator.language];
          return languages.some((language) => /^zh\b/i.test(language || "")) ? "zh" : "en";
        }

        const target = savedLocale() || browserLocale();
        window.location.replace(`/${target}`);
      })();
    </script> </main>  </div>  </body></html>
